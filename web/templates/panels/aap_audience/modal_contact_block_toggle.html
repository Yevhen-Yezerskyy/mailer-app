{% load i18n %}
<!-- FILE: web/templates/panels/aap_audience/modal_contact_block_toggle.html -->
<!-- DATE: 2026-04-23 -->
<!-- PURPOSE: Confirm block/unblock action for contact in contacts manage table. -->

<div class="YY-CARD_WHITE overflow-hidden" style="max-height:85vh;width:620px;">
  <button type="button" class="YY-BUTTON_MAIN !w-fit" data-yy-modal-close style="position:absolute;top:10px;right:10px;">✕</button>

  <div class="overflow-auto mt-10 mb-1 max-h-[calc(85vh-5rem)]">
    {% if status == "ok" %}
      <div class="YY-STATUS_YELLOW !mb-3">{{ modal_title }}</div>

      <div class="YY-CARD_WHITE border border-[#71d0f4]">
        <div class="YY-TEXT !mb-0">
          <strong>{{ company_name|default:"-" }}</strong><br>
          {{ email|default:"-" }}
        </div>
      </div>

      <form method="post" action="{{ post_url }}" class="mt-4">
        {% csrf_token %}
        <input type="hidden" name="action" value="{{ action_name }}">
        <input type="hidden" name="id" value="{{ contact_ui_id }}">
        <input type="hidden" name="mode" value="{{ mode }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="grid grid-cols-2 gap-4">
          <button type="submit" class="YY-BUTTON_MAIN_FULL">{% trans "Подтвердить" %}</button>
          <button type="button" class="YY-BUTTON_MAIN_FULL" data-yy-modal-close>{% trans "Отменить" %}</button>
        </div>
      </form>
    {% else %}
      <div class="YY-STATUS_GRAY w-full">{% trans "Здесь пока нет данных" %}</div>
    {% endif %}
  </div>
</div>
