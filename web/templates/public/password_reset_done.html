{% extends "public/base.html" %}
{% load i18n %}

{% block title %}{% trans "Сброс пароля" %} — Serenity{% endblock %}

{% block content %}
<!-- FILE: web/templates/public/password_reset_done.html -->
<div class="box" style="flex-direction: column;">
  <h2>{% trans "Сброс пароля" %}</h2>

  <div style="margin-top:22px;color:#006991;line-height:1.5;width:100%;max-width:560px;">
    <p style="margin:0;">{% trans "Если такой адрес есть, на него отправлена ссылка для смены пароля." %}</p>
  </div>

  <div style="display:flex;flex-direction:column;gap:12px;justify-content:center;align-items:stretch;margin:30px 0 10px 0;width:100%;max-width:560px;">
    <form method="get" action="{% url 'login' %}" style="margin:0;">
      <button type="submit" class="btn" style="width:100%;font-size:20px;padding:12px 40px;line-height:1;">{% trans "Вернуться к логину" %}</button>
    </form>
  </div>
</div>
{% endblock %}
