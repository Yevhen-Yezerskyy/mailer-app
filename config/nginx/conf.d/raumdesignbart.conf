server {
    listen 80;
    listen [::]:80;
    server_name ausschreibung.raumdesign-bart.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ausschreibung.raumdesign-bart.de;

    ssl_certificate     /etc/letsencrypt/live/ausschreibung.raumdesign-bart.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ausschreibung.raumdesign-bart.de/privkey.pem;

    root /app/client-subsites/ausschreibung.raumdesign-bart.de;
    index index.html;

    location ~* \.php(?:$|/) { return 444; }
    location ~ /\.(?!well-known) { return 444; }

    location / {
        try_files $uri $uri/ =404;
    }
}
