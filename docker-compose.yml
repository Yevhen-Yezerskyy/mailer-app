# FILE: docker-compose.yml
# DATE: 2026-02-21
# PURPOSE: Incremental compose bootstrap with one-shot secrets env initializer and unified service runner.

services:
  mailer-set-env:
    build:
      context: .
      dockerfile: config/docker/Dockerfile_mailer_python
    image: mailer-python:latest
    container_name: mailer-set-env
    init: true
    working_dir: /app
    restart: unless-stopped
    stop_signal: SIGKILL
    stop_grace_period: 0s
    environment:
      PYTHONPATH: /app
      SERENITY_KEYS_MASTER_KEY: ${SERENITY_KEYS_MASTER_KEY:?missing}
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - ./config/sh/init_set_env.sh:/usr/local/bin/init_set_env.sh:ro
      - ./config/sh/trim_host_logs.sh:/usr/local/bin/trim_host_logs.sh:ro
      - mailer-app-prod:/app
      - serenity-secrets:/run/serenity-secrets
    command:
      - /bin/sh
      - /usr/local/bin/init_set_env.sh

  mailer-tools:
    image: mailer-python:latest
    container_name: mailer-tools
    init: true
    working_dir: /app
    restart: unless-stopped
    stop_signal: SIGKILL
    stop_grace_period: 0s
    depends_on:
      mailer-set-env:
        condition: service_started
      mailer-redis:
        condition: service_started
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - mailer-app-prod:/app
      - mailer-static:/app/web/staticfiles
      - mailer-media:/app/web/media
      - serenity-redis-run:/app/run/redis
      - serenity-redis-run:/app-dev/run/redis
      - serenity-secrets:/run/serenity-secrets:ro
      - certbot-etc:/etc/letsencrypt:ro
      - /home/eee/.ssh:/root/.ssh:ro
      - ./:/app-dev
    command: ["/app/config/sh/with-secrets.sh", "sleep", "infinity"]

  mailer-redis:
    image: redis:7-alpine
    container_name: mailer-redis
    init: true
    restart: unless-stopped
    command: >
      /bin/sh -c "exec redis-server /etc/redis/redis.conf"
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - ./config/redis/redis-prod.conf:/etc/redis/redis.conf:ro
      - serenity-redis-run:/app/run/redis
      - serenity-redis-data:/data

  mailer-db:
    image: postgres:16
    container_name: mailer-db
    init: true
    restart: unless-stopped
    depends_on:
      mailer-set-env:
        condition: service_started
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - mailer-db-data:/var/lib/postgresql/data
      - mailer-app-prod:/app:ro
      - serenity-secrets:/run/serenity-secrets:ro
    entrypoint: ["/app/config/sh/with-secrets.sh", "/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /home/eee/mailer-app/logs/postgres
        touch /home/eee/mailer-app/logs/postgres/postgresql.log
        chown postgres:postgres /home/eee/mailer-app/logs/postgres /home/eee/mailer-app/logs/postgres/postgresql.log
        chmod 777 /home/eee/mailer-app/logs/postgres
        chmod 640 /home/eee/mailer-app/logs/postgres/postgresql.log
        exec docker-entrypoint.sh postgres \
          -c shared_preload_libraries=pg_stat_statements \
          -c pg_stat_statements.track=all \
          -c pg_stat_statements.max=10000 \
          -c logging_collector=on \
          -c log_destination=stderr \
          -c log_directory='/home/eee/mailer-app/logs/postgres' \
          -c log_filename='postgresql.log' \
          -c log_truncate_on_rotation=off \
          -c log_rotation_age=0 \
          -c log_rotation_size=0 \
          -c log_min_messages=warning \
          -c log_min_error_statement=error \
          -c log_min_duration_statement=1000
    ports:
      - "5433:5432"

  mailer-web:
    image: mailer-python:latest
    container_name: mailer-web
    init: true
    working_dir: /app/web
    restart: unless-stopped
    user: "1001:1001"
    depends_on:
      mailer-set-env:
        condition: service_started
      mailer-db:
        condition: service_started
      mailer-redis:
        condition: service_started
    environment:
      DEBUG: "1"
      DJANGO_INSTANCE: "dev"
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - ./:/app
      - serenity-redis-run:/app/run/redis
      - serenity-secrets:/run/serenity-secrets:ro
    command: ["/app/config/sh/with-secrets.sh", "python", "manage.py", "runserver", "0.0.0.0:8000"]

  browser-diag-capture:
    image: mailer-python:latest
    container_name: browser-diag-capture
    init: true
    working_dir: /app
    restart: unless-stopped
    user: "1001:1001"
    environment:
      PYTHONPATH: /app
      BROWSER_DIAG_HTTP_PORT: "18080"
      BROWSER_DIAG_HTTPS_PORT: "18443"
      BROWSER_DIAG_CERT: /tmp/browser-diag-capture/cert.pem
      BROWSER_DIAG_KEY: /tmp/browser-diag-capture/key.pem
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - ./:/app
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        mkdir -p /tmp/browser-diag-capture /home/eee/mailer-app/logs/testing
        if [ ! -s "$$BROWSER_DIAG_CERT" ] || [ ! -s "$$BROWSER_DIAG_KEY" ]; then
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout "$$BROWSER_DIAG_KEY" \
            -out "$$BROWSER_DIAG_CERT" \
            -days 365 \
            -subj "/CN=browser-diag-capture" >/dev/null 2>&1
        fi
        exec python /app/tmp/browser_diag_capture.py

  mailer-web-prod:
    image: mailer-python:latest
    container_name: mailer-web-prod
    init: true
    working_dir: /app/web
    restart: unless-stopped
    depends_on:
      mailer-set-env:
        condition: service_started
      mailer-db:
        condition: service_started
      mailer-redis:
        condition: service_started
    environment:
      DEBUG: "0"
      DJANGO_INSTANCE: "prod"
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:18001:8000"
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - mailer-app-prod:/app
      - ./client-subsites:/app/client-subsites
      - mailer-static:/app/web/staticfiles
      - mailer-media:/app/web/media
      - serenity-redis-run:/app/run/redis
      - serenity-secrets:/run/serenity-secrets:ro
    command:
      - /app/config/sh/with-secrets.sh
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /home/eee/mailer-app/logs/django-prod
        exec gunicorn mailer_web.wsgi:application \
          --bind 0.0.0.0:8000 \
          --workers 2 \
          --timeout 420 \
          --access-logfile /home/eee/mailer-app/logs/django-prod/access.log \
          --error-logfile /home/eee/mailer-app/logs/django-prod/error.log \
          --capture-output \
          --log-level info

  mailer-web-admin:
    image: mailer-python:latest
    container_name: mailer-web-admin
    init: true
    working_dir: /app/web-admin
    restart: unless-stopped
    user: "1001:1001"
    depends_on:
      mailer-set-env:
        condition: service_started
      mailer-db:
        condition: service_started
      mailer-redis:
        condition: service_started
    environment:
      DEBUG: "1"
      DJANGO_INSTANCE: "admin-dev"
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:18002:8000"
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - ./:/app
      - serenity-redis-run:/app/run/redis
      - serenity-secrets:/run/serenity-secrets:ro
    command: ["/app/config/sh/with-secrets.sh", "python", "manage.py", "runserver", "0.0.0.0:8000"]

  mailer-web-admin-prod:
    image: mailer-python:latest
    container_name: mailer-web-admin-prod
    init: true
    working_dir: /app/web-admin
    restart: unless-stopped
    depends_on:
      mailer-set-env:
        condition: service_started
      mailer-db:
        condition: service_started
      mailer-redis:
        condition: service_started
    environment:
      DEBUG: "0"
      DJANGO_INSTANCE: "admin-prod"
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:18003:8000"
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - mailer-app-prod:/app
      - serenity-redis-run:/app/run/redis
      - serenity-secrets:/run/serenity-secrets:ro
    command:
      - /app/config/sh/with-secrets.sh
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /home/eee/mailer-app/logs/django-admin-prod
        exec gunicorn web_admin.wsgi:application \
          --bind 0.0.0.0:8000 \
          --workers 2 \
          --timeout 420 \
          --access-logfile /home/eee/mailer-app/logs/django-admin-prod/access.log \
          --error-logfile /home/eee/mailer-app/logs/django-admin-prod/error.log \
          --capture-output \
          --log-level info

