  nginx:
    image: nginx:1.26
    container_name: serenity-nginx
    init: true
    network_mode: host
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    depends_on:
      certbot-init:
        condition: service_completed_successfully
      mailer-web:
        condition: service_started
      mailer-web-prod:
        condition: service_started
      mailer-web-admin:
        condition: service_started
      mailer-web-admin-prod:
        condition: service_started
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - ./logs:/host-logs
      - serenity-logs:/serenity-logs
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./config/nginx/includes:/etc/nginx/includes:ro
      - mailer-app-prod:/app
      - ./client-subsites:/app/client-subsites:ro
      - mailer-static:/var/www/mail-static:ro
      - mailer-media:/var/www/mail-media
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    command:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /home/eee/mailer-app/logs/nginx
        mkdir -p /host-logs/smrel
        mkdir -p /serenity-logs/smrel
        chmod 777 /home/eee/mailer-app/logs/nginx /host-logs/smrel /serenity-logs/smrel || true
        exec nginx -g 'daemon off;'

  certbot-init:
    image: certbot/certbot:latest
    container_name: serenity-certbot-init
    init: true
    restart: "no"
    environment:
      CERTBOT_MODE: "init"
      CERTBOT_EMAIL: "yevhen.yezerskyy@gmail.com"
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./config/sh/certbot_run.sh:/usr/local/bin/certbot_run.sh:ro
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    entrypoint: ["/bin/sh", "/usr/local/bin/certbot_run.sh"]

  certbot:
    image: certbot/certbot:latest
    container_name: serenity-certbot
    init: true
    restart: unless-stopped
    pid: "service:nginx"
    stop_signal: SIGKILL
    stop_grace_period: 0s
    depends_on:
      nginx:
        condition: service_started
    environment:
      CERTBOT_MODE: "renew"
      CERTBOT_EMAIL: "yevhen.yezerskyy@gmail.com"
      CERTBOT_RENEW_INTERVAL_SECONDS: "43200"
    volumes:
      - /home/eee/mailer-app/logs:/home/eee/mailer-app/logs
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./config/sh/certbot_run.sh:/usr/local/bin/certbot_run.sh:ro
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    entrypoint: ["/bin/sh", "/usr/local/bin/certbot_run.sh"]

volumes:
  mailer-db-data:
    external: true
  mailer-app-prod:
    external: true
  mailer-static:
    external: true
  mailer-media:
    external: true
  serenity-redis-run:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=64m,uid=1001,gid=1001,mode=0777"
  serenity-redis-data:
  serenity-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=16m,uid=0,gid=0,mode=0777"
  serenity-logs:
  certbot-www:
  certbot-etc:
